<!DOCTYPE html>
<html>
	<head>
		<style>
			body {
				font-family: Arial;
			}

			nav ul {
				list-style-type: none;
				padding: 20px;
				overflow: hidden;
				background-color: #333333;
			}

			nav ul li {
				float: left;
			}

			a {
				color: white;
				text-align: center;
				padding: 14px 16px;
				text-decoration: none;
			}

			.dropbtn {
				border: none;
				outline: none;
				background-color: inherit;
				font-family: inherit;
				font-size: inherit;
				color: white;
			}

			.dropdown-content {
				display: none;
			}

			.dropdown:hover .dropdown-content {
				display: block;
			}
		</style>
	</head>
	
	<body>
		<nav>
			<ul>
				<li> <a href="#"> Home </a> </li>
				<li> <a href="#"> Browse </a> </li>
				<li class="dropdown">
					<button class="dropbtn"> Shop </button>
					<div class="dropdown-content">
						<a href="#"> Electronics </a>
						<a href="#"> Clothing </a>
					</div>
				</li>
			</ul>
		</nav>
	</body>
</html>
