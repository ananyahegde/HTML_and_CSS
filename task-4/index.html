<!DOCTYPE html>
<html>
	<head>
		<style>
			body {
				font-family: Arial;
			}

			nav ul {
				list-style-type: none;
				padding: 20px;
				overflow: hidden;
				background-color: #333333;
			}

			nav ul li {
				float: left;
			}

			a {
				color: white;
				text-align: center;
				padding: 14px 16px;
				text-decoration: none;
			}

			.dropdown { 
				position: relative 
				float: left;
				overflow: hidden;
			}

			.dropbtn {
				border: none;
				outline: none;
				background-color: inherit;
				font-family: inherit;
				font-size: inherit;
				color: white;
			}

			.dropdown-content {
				display: none;
  				position: absolute;
  				background-color: #f9f9f9;
  				min-width: 160px;
  				box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
  				z-index: 1;
			}

			.dropdown a { color: black }
			
			.dropdown:hover .dropdown-content {
				display: block;
				
			}

			.dropdown-content a {
				display: block;
			}

			a:hover {
				background-color: red;
				color: black;
			}

		</style>
	</head>
	
	<body>
		<nav>
			<ul>
				<li> <a href="#"> Home </a> </li>
				<li> <a href="#"> Browse </a> </li>
				<li class="dropdown">
					<a href="#"> <button class="dropbtn"> Shop 🠟 </button> </a>
					<div class="dropdown-content">
						<a href="#"> Electronics </a>
						<a href="#"> Clothing </a>
					</div>
				</li>
			</ul>
		</nav>
	</body>
</html>
